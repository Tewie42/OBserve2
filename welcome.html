<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; margin: 20px; max-width: 600px; }
        h2 { color: #2a6f37; text-align: center; }
        .card { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .row { margin: 5px 0; }
        .label { font-weight: bold; }
        button { background: #2a6f37; color: white; padding: 12px; border: none; width: 100%; margin-top: 20px; cursor: pointer; border-radius: 6px; font-size: 16px; }
    </style>
</head>
<body>

<h2 id="welcomeTitle">Welcome</h2>

<div class="card">
    <div class="row"><span class="label">Name:</span> <span id="name"></span></div>
    <div class="row"><span class="label">Username:</span> <span id="username"></span></div>
    <div class="row"><span class="label">Badge:</span> <span id="badge"></span></div>
    <div class="row"><span class="label">Position:</span> <span id="position"></span></div>
    <div class="row"><span class="label">Weekly Target:</span> <span id="weeklyTarget"></span> observations</div>
    <div class="row"><span class="label">Direct Superior (N+1):</span> <span id="superior"></span></div>
    <div class="row"><span class="label">N+1 Number:</span> <span id="superiorPhone"></span></div>
</div>

<button onclick="startObservation()">Start Observation</button>

<script>
function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
}

function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

let currentUser = null;

function loadUser() {
    const username = getQueryParam("user");
    if (!username) {
        alert("No user specified.");
        return;
    }

    const users = getUsers();
    currentUser = users.find(u => u.username === username);

    if (!currentUser) {
        alert("User not found. Please contact your administrator.");
        return;
    }

    document.getElementById("welcomeTitle").textContent = `Welcome, ${currentUser.name}`;
    document.getElementById("name").textContent = currentUser.name || "";
    document.getElementById("username").textContent = currentUser.username || "";
    document.getElementById("badge").textContent = currentUser.badge || "";
    document.getElementById("position").textContent = currentUser.position || "";
    document.getElementById("weeklyTarget").textContent = currentUser.weeklyTarget || 0;
    document.getElementById("superior").textContent = currentUser.superior || "";
    document.getElementById("superiorPhone").textContent = currentUser.superiorPhone || "";
}

function startObservation() {
    window.location.href = "observation-form.html";
}

loadUser();
</script>

</body>
</html>
