<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; margin: 20px; max-width: 800px; }
        h2 { color: #2a6f37; text-align: center; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input { width: 100%; padding: 8px; margin-top: 4px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #2a6f37; color: white; padding: 10px; border: none; width: 100%; margin-top: 15px; cursor: pointer; border-radius: 6px; font-size: 16px; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 8px; border-bottom: 1px solid #ccc; }
        .whatsapp-btn { background: #25D366; padding: 6px 10px; border-radius: 6px; color: white; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<h2>Admin Panel</h2>

<h3>Add / Edit User</h3>

<label>Name</label>
<input type="text" id="name">

<label>Username</label>
<input type="text" id="username">

<label>Badge Number</label>
<input type="text" id="badge">

<label>WhatsApp Number (international format)</label>
<input type="text" id="phone" placeholder="e.g. 261341234567">

<label>Position</label>
<input type="text" id="position">

<label>N+1 (Direct Superior)</label>
<input type="text" id="superior">

<label>N+1 Number</label>
<input type="text" id="superiorPhone" placeholder="e.g. 261341234568">

<label>Weekly Target (number)</label>
<input type="number" id="weeklyTarget" min="0">

<button onclick="addUser()">Save User</button>

<h3>Users</h3>
<table id="userTable">
    <tr>
        <th>Name</th>
        <th>Username</th>
        <th>Badge</th>
        <th>Phone</th>
        <th>Weekly Target</th>
        <th>Action</th>
    </tr>
</table>

<script>
function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

function loadUsers() {
    const users = getUsers();
    const table = document.getElementById("userTable");
    table.innerHTML = `
        <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Badge</th>
            <th>Phone</th>
            <th>Weekly Target</th>
            <th>Action</th>
        </tr>
    `;

    users.forEach(u => {
        const row = document.createElement("tr");

        const signupUrl = `signup.html?user=${encodeURIComponent(u.username)}`;
        const waText = `Please register to submit HSE observations: ${window.location.origin}${window.location.pathname.replace(/[^\/]*$/, '')}${signupUrl}`;
        const waLink = `https://wa.me/${u.phone}?text=${encodeURIComponent(waText)}`;

        row.innerHTML = `
            <td>${u.name}</td>
            <td>${u.username}</td>
            <td>${u.badge}</td>
            <td>${u.phone}</td>
            <td>${u.weeklyTarget}</td>
            <td><a class="whatsapp-btn" href="${waLink}" target="_blank">Send Signup Link</a></td>
        `;
        table.appendChild(row);
    });
}

function addUser() {
    const name = document.getElementById("name").value.trim();
    const username = document.getElementById("username").value.trim();
    const badge = document.getElementById("badge").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const position = document.getElementById("position").value.trim();
    const superior = document.getElementById("superior").value.trim();
    const superiorPhone = document.getElementById("superiorPhone").value.trim();
    const weeklyTarget = parseInt(document.getElementById("weeklyTarget").value, 10);

    if (!name || !username || !phone || isNaN(weeklyTarget)) {
        alert("Please fill in Name, Username, Phone and Weekly Target.");
        return;
    }

    let users = getUsers();

    const existingIndex = users.findIndex(u => u.username === username);
    const userObj = {
        name,
        username,
        badge,
        phone,
        position,
        superior,
        superiorPhone,
        weeklyTarget,
        registered: existingIndex >= 0 ? users[existingIndex].registered : false,
        password: existingIndex >= 0 ? users[existingIndex].password : null
    };

    if (existingIndex >= 0) {
        users[existingIndex] = userObj;
    } else {
        users.push(userObj);
    }

    saveUsers(users);
    loadUsers();

    document.getElementById("name").value = "";
    document.getElementById("username").value = "";
    document.getElementById("badge").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("position").value = "";
    document.getElementById("superior").value = "";
    document.getElementById("superiorPhone").value = "";
    document.getElementById("weeklyTarget").value = "";
}

loadUsers();
</script>

</body>
</html>
