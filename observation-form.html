<!DOCTYPE html>
<html>
<head>
    <title>Observation Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { font-family: Arial; margin: 20px; max-width: 600px; }
        h2 { color: #2a6f37; text-align: center; }

        label { font-weight: bold; margin-top: 10px; display: block; }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            background: #2a6f37;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }

        .lang-select {
            position: fixed;
            top: 10px;
            left: 10px;
        }
    </style>
</head>

<body>

<!-- LANGUAGE SELECTOR -->
<div class="lang-select">
    <select id="languageSelect"></select>
</div>

<h2 id="title">Observation Form</h2>

<label id="lblType"></label>
<select id="type">
    <option value="Unsafe Act">Unsafe Act</option>
    <option value="Unsafe Condition">Unsafe Condition</option>
    <option value="Near Miss">Near Miss</option>
</select>

<label id="lblCategory"></label>
<input type="text" id="category">

<label id="lblCondition"></label>
<textarea id="condition" rows="4"></textarea>

<label id="lblRisk"></label>
<select id="risk">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
</select>

<button id="btnSubmit"></button>

<script>
// UI TRANSLATION DICTIONARY
const translations = {
    en: {
        title: "Observation Form",
        type: "Type",
        category: "Category",
        condition: "Describe the condition",
        risk: "Risk Level",
        submit: "Submit Observation"
    },
    fr: {
        title: "Formulaire d'observation",
        type: "Type",
        category: "Catégorie",
        condition: "Décrivez la condition",
        risk: "Niveau de risque",
        submit: "Soumettre l'observation"
    },
    mg: {
        title: "Taratasy Fandinihana",
        type: "Karazana",
        category: "Sokajy",
        condition: "Farito ny toe-javatra",
        risk: "Haavon'ny loza",
        submit: "Alefa ny tatitra"
    },
    pt: {
        title: "Formulário de Observação",
        type: "Tipo",
        category: "Categoria",
        condition: "Descreva a condição",
        risk: "Nível de risco",
        submit: "Enviar observação"
    },
    hi: {
        title: "अवलोकन फ़ॉर्म",
        type: "प्रकार",
        category: "श्रेणी",
        condition: "स्थिति का वर्णन करें",
        risk: "जोखिम स्तर",
        submit: "प्रस्तुत करें"
    },
    ar: {
        title: "نموذج الملاحظة",
        type: "النوع",
        category: "الفئة",
        condition: "وصف الحالة",
        risk: "مستوى الخطر",
        submit: "إرسال الملاحظة"
    },
    sw: {
        title: "Fomu ya Uangalizi",
        type: "Aina",
        category: "Kategoria",
        condition: "Eleza hali",
        risk: "Kiwango cha hatari",
        submit: "Tuma Uangalizi"
    },
    zh: {
        title: "观察表",
        type: "类型",
        category: "类别",
        condition: "描述情况",
        risk: "风险等级",
        submit: "提交观察"
    }
};

// POPULATE LANGUAGE DROPDOWN
const languageSelect = document.getElementById("languageSelect");
const languages = {
    en: "English",
    fr: "Français",
    mg: "Malagasy",
    pt: "Português",
    hi: "हिन्दी",
    ar: "العربية",
    sw: "Kiswahili",
    zh: "中文"
};

for (const code in languages) {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = languages[code];
    languageSelect.appendChild(opt);
}

// DEFAULT LANGUAGE
let currentLang = "en";
languageSelect.value = currentLang;

// APPLY TRANSLATION
function applyTranslation() {
    const t = translations[currentLang];
    document.getElementById("title").textContent = t.title;
    document.getElementById("lblType").textContent = t.type;
    document.getElementById("lblCategory").textContent = t.category;
    document.getElementById("lblCondition").textContent = t.condition;
    document.getElementById("lblRisk").textContent = t.risk;
    document.getElementById("btnSubmit").textContent = t.submit;
}

languageSelect.addEventListener("change", () => {
    currentLang = languageSelect.value;
    applyTranslation();
});

applyTranslation();

// SAVE OBSERVATION
function saveObservation() {
    const obs = JSON.parse(localStorage.getItem("observations") || "[]");

    const original = document.getElementById("condition").value;

    // Placeholder translation (replace with real API later)
    const translated = original; // For now, store same text

    obs.push({
        id: "obs-" + Math.random().toString(36).substr(2,9),
        date: new Date().toISOString().split("T")[0],
        type: document.getElementById("type").value,
        category: document.getElementById("category").value,
        condition_original: original,
        condition_translated: translated,
        risk: document.getElementById("risk").value,
        language: currentLang,
        status: "Not Actioned"
    });

    localStorage.setItem("observations", JSON.stringify(obs));
    alert("Observation submitted!");
    window.location.href = "welcome.html";
}

document.getElementById("btnSubmit").addEventListener("click", saveObservation);
</script>

</body>
</html>
